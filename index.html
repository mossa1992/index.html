<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEONEARN - Earn Crypto Instantly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neon: {
                            blue: '#00f3ff',
                            purple: '#bc13fe',
                            pink: '#ff007f'
                        }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050510;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
        }
        .neon-text-blue {
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            color: #00f3ff;
        }
        .neon-text-pink {
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            color: #ff007f;
        }
        .neon-border {
            box-shadow: 0 0 10px #bc13fe, inset 0 0 10px #bc13fe;
            border-color: #bc13fe;
        }
        
        .coin-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: 4px solid #fffacd;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), inset 0 0 15px rgba(255,255,255,0.8);
            transition: transform 0.1s;
        }
        .coin-btn:active {
            transform: scale(0.95);
        }
        .floating-text {
            position: absolute;
            color: #00ea00;
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 5px #00ea00;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        
        /* Toast notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            border: 1px solid #00f3ff;
            box-shadow: 0 0 15px #00f3ff;
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }
        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
    
    <!-- Background glows -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-neon-purple/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-neon-blue/20 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header -->
    <header class="glass-panel mx-4 mt-4 p-4 flex justify-between items-center sticky top-4 z-20">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-neon-blue to-neon-purple flex items-center justify-center font-bold text-white">
                NE
            </div>
            <h1 class="text-xl font-black tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-neon-blue to-neon-purple">
                NEONEARN
            </h1>
        </div>
        <div class="flex gap-4 items-center">
            <div class="text-right">
                <p class="text-xs text-gray-400 uppercase tracking-widest">Balance</p>
                <p class="text-2xl font-mono font-bold neon-text-blue flex items-center gap-1">
                    $<span id="balance">24.82</span>
                </p>
            </div>
            <button onclick="openWallet()" class="bg-neon-purple/20 hover:bg-neon-purple/40 border border-neon-purple text-white px-4 py-2 rounded-lg transition-all duration-300 shadow-[0_0_10px_rgba(188,19,254,0.3)]">
                Wallet
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 relative z-10 w-full max-w-4xl mx-auto space-y-8 mt-8">
        
        <!-- Dashboard / Miner Section -->
        <div id="dashboard" class="w-full flex flex-col items-center gap-8 animate-fade-in">
            <div class="text-center space-y-2">
                <h2 class="text-3xl font-bold">Tap to <span class="neon-text-pink">Earn</span></h2>
                <p class="text-gray-400">Mine crypto coins instantly by tapping!</p>
            </div>

            <div class="relative w-64 h-64 flex items-center justify-center animate-float" id="coin-container">
                <button id="tap-coin" class="coin-btn w-48 h-48 rounded-full flex items-center justify-center relative cursor-pointer outline-none">
                    <span class="text-6xl text-yellow-700 font-bold">$</span>
                </button>
                <!-- Energy bar -->
                <div class="absolute -bottom-8 w-48 h-2 bg-gray-800 rounded-full overflow-hidden">
                    <div id="energy-bar" class="h-full bg-gradient-to-r from-green-400 to-neon-blue w-full transition-all duration-300"></div>
                </div>
            </div>

            <div class="glass-panel w-full p-6 mt-8">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span class="text-neon-blue">⚡</span> Active Tasks
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-black/40 border border-gray-700 p-4 rounded-lg flex justify-between items-center hover:border-neon-blue transition-colors">
                        <div>
                            <p class="font-bold">Watch Video Ad</p>
                            <p class="text-sm text-gray-400">Reward: +$0.50</p>
                        </div>
                        <button onclick="completeTask(0.50, this)" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-bold">Start</button>
                    </div>
                    <div class="bg-black/40 border border-gray-700 p-4 rounded-lg flex justify-between items-center hover:border-neon-purple transition-colors">
                        <div>
                            <p class="font-bold">Follow on Twitter</p>
                            <p class="text-sm text-gray-400">Reward: +$1.00</p>
                        </div>
                        <button onclick="completeTask(1.00, this)" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded text-sm font-bold">Start</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Live Earnings Feed -->
    <div class="fixed bottom-4 left-4 glass-panel p-3 text-sm flex flex-col gap-2 max-h-[120px] overflow-hidden hidden md:flex">
        <h4 class="text-gray-400 text-xs font-bold uppercase tracking-wider">Live Feed</h4>
        <div id="live-feed" class="flex flex-col gap-1 transition-all">
            <!-- Feed items will be inserted here -->
        </div>
    </div>

    <!-- Wallet Modal (Hidden by default) -->
    <div id="wallet-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="glass-panel max-w-md w-full p-8 border-neon-purple transform scale-95 transition-transform duration-300" id="wallet-content">
            <div class="flex justify-between items-start mb-6">
                <h2 class="text-2xl font-bold neon-text-purple">Withdraw Funds</h2>
                <button onclick="closeWallet()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div class="bg-black/50 p-4 rounded-lg mb-6 text-center">
                <p class="text-gray-400 mb-1">Available Balance</p>
                <p class="text-4xl font-mono font-bold text-green-400">$<span id="wallet-balance">24.82</span></p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Withdraw Method</label>
                    <select class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-white focus:border-neon-blue outline-none">
                        <option>Bitcoin (BTC)</option>
                        <option>Ethereum (ETH)</option>
                        <option>PayPal</option>
                        <option>Bank Transfer</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Wallet Address / Email</label>
                    <input type="text" placeholder="Enter details..." class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-white focus:border-neon-blue outline-none">
                </div>
                <button onclick="attemptWithdraw()" class="w-full bg-gradient-to-r from-neon-blue to-neon-purple py-3 rounded-lg font-bold text-lg mt-4 shadow-[0_0_15px_rgba(188,19,254,0.5)] hover:shadow-[0_0_25px_rgba(188,19,254,0.8)] transition-all">
                    Confirm Withdrawal
                </button>
                <p id="withdraw-msg" class="text-red-400 text-sm text-center hidden">Minimum withdrawal amount is $50.00</p>
            </div>
        </div>
    </div>

    <div id="toast">Message here</div>

    <script>
        // State
        let balance = 24.82;
        let energy = 100;
        let maxEnergy = 100;
        
        // DOM Elements
        const balanceEl = document.getElementById('balance');
        const walletBalanceEl = document.getElementById('wallet-balance');
        const tapCoin = document.getElementById('tap-coin');
        const coinContainer = document.getElementById('coin-container');
        const energyBar = document.getElementById('energy-bar');
        const liveFeed = document.getElementById('live-feed');
        const walletModal = document.getElementById('wallet-modal');
        const walletContent = document.getElementById('wallet-content');
        
        // Format money
        const formatMoney = (amount) => amount.toFixed(2);
        
        // Update balance display
        function updateBalance(amount) {
            balance += amount;
            const formatted = formatMoney(balance);
            balanceEl.innerText = formatted;
            walletBalanceEl.innerText = formatted;
            
            // Add slight pulse effect to balance
            balanceEl.parentElement.classList.add('scale-110', 'text-white');
            setTimeout(() => {
                balanceEl.parentElement.classList.remove('scale-110', 'text-white');
            }, 200);
        }

        // Tap Mechanics
        tapCoin.addEventListener('click', (e) => {
            if (energy <= 0) {
                showToast("Out of energy! Wait to recharge.");
                return;
            }
            
            // Deduct energy
            energy -= 2;
            energyBar.style.width = `${(energy/maxEnergy)*100}%`;
            
            // Calculate random earning between $0.01 and $0.05
            const earned = (Math.random() * 0.04 + 0.01);
            updateBalance(earned);
            
            // Create floating text effect
            createFloatingText(e, `+$${earned.toFixed(2)}`);
            
            // Play a tiny sound effect if possible (simulated here)
            // Haptic feedback for mobile
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        });

        // Floating Text Animation
        function createFloatingText(e, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            
            // Position near the click
            const rect = coinContainer.getBoundingClientRect();
            
            // If it's a mouse/touch event with coordinates
            if (e.clientX) {
                const x = e.clientX - rect.left - 20;
                const y = e.clientY - rect.top - 20;
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
            } else {
                // Fallback to center
                el.style.left = '50%';
                el.style.top = '30%';
                el.style.transform = 'translate(-50%, -50%)';
            }
            
            coinContainer.appendChild(el);
            
            // Remove element after animation
            setTimeout(() => {
                el.remove();
            }, 1000);
        }

        // Energy Regeneration
        setInterval(() => {
            if (energy < maxEnergy) {
                energy = Math.min(maxEnergy, energy + 5);
                energyBar.style.width = `${(energy/maxEnergy)*100}%`;
            }
        }, 1000);

        // Simulated Live Feed
        const fakeNames = ["User_992", "CryptoKing", "Sarah_L", "Ali99", "EarnMaster", "Neo_Hacker"];
        setInterval(() => {
            const name = fakeNames[Math.floor(Math.random() * fakeNames.length)];
            const amt = (Math.random() * 5 + 0.5).toFixed(2);
            
            const p = document.createElement('p');
            p.className = 'text-green-400 animate-fade-in text-xs';
            p.innerHTML = `<span class="text-white">${name}</span> earned $${amt}`;
            
            liveFeed.prepend(p);
            
            // Keep only last 4 items
            if (liveFeed.children.length > 4) {
                liveFeed.lastChild.remove();
            }
        }, 3500);

        // Task completion
        window.completeTask = function(reward, btnElement) {
            const originalText = btnElement.innerText;
            btnElement.innerText = "Loading...";
            btnElement.disabled = true;
            btnElement.classList.add('opacity-50');
            
            // Simulate task verification delay
            setTimeout(() => {
                updateBalance(reward);
                showToast(`Task completed! You earned $${reward.toFixed(2)}`);
                btnElement.innerText = "Completed";
                btnElement.classList.remove('bg-blue-600', 'bg-purple-600', 'hover:bg-blue-500', 'hover:bg-purple-500');
                btnElement.classList.add('bg-green-600', 'text-white');
            }, 1500);
        }

        // Wallet Functions
        window.openWallet = function() {
            walletModal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                walletContent.classList.remove('scale-95');
                walletContent.classList.add('scale-100');
            }, 10);
        }

        window.closeWallet = function() {
            walletContent.classList.remove('scale-100');
            walletContent.classList.add('scale-95');
            setTimeout(() => {
                walletModal.classList.add('opacity-0', 'pointer-events-none');
            }, 300);
        }

        window.attemptWithdraw = function() {
            const msg = document.getElementById('withdraw-msg');
            if (balance < 50.00) {
                msg.classList.remove('hidden');
                msg.innerText = `Minimum withdrawal is $50.00 (You need $${(50 - balance).toFixed(2)} more)`;
            } else {
                msg.classList.remove('hidden', 'text-red-400');
                msg.classList.add('text-green-400');
                msg.innerText = "Withdrawal request submitted successfully!";
                setTimeout(() => {
                    balance = 0;
                    updateBalance(0);
                    closeWallet();
                }, 2000);
            }
        }

        // Toast notifications
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
                       </html>
